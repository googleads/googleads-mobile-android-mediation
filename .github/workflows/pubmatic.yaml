name: pubmatic

on:
  pull_request:
    paths:
      - "ThirdPartyAdapters/pubmatic/**"
      - ".github/workflows/pubmatic.yaml"
  push:
    branches:
      - main

jobs:
  android:
    name: TestPubMaticAdapter
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: "Unit Tests"
        run: |
          cd ThirdPartyAdapters/pubmatic/
          GRADLE_VERSION=$(sed -E -n 's/.*gradle-(.*)-(bin|all)\.zip/\1/p' gradle/wrapper/gradle-wrapper.properties)
          GRADLE_MAJOR_VERSION="${GRADLE_VERSION%%.*}"
          brew install gradle@$GRADLE_MAJOR_VERSION
          brew link gradle@$GRADLE_MAJOR_VERSION
          gradle wrapper --gradle-version $GRADLE_VERSION
          ./gradlew test --scan